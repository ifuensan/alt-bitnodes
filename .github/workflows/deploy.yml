name: Deploy to EC2

on:
  push:
    branches: [main]
    # Skip deploys when a push only touches docs / openspec / BMAD artefacts.
    # workflow_dispatch still lets us force a deploy if needed.
    paths-ignore:
      - 'openspec/**'
      - 'docs/**'
      - '_bmad/**'
      - '_bmad-output/**'
      - '.claude/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: PRO
    timeout-minutes: 20
    steps:
      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 5 -t rsa,ecdsa,ed25519 "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Run installer on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        # `git pull` runs before install.sh so the script on disk matches
        # the commit being deployed. Without this the installer runs an
        # older snapshot of itself and may revert config changes that this
        # very commit introduces (install.sh later re-pulls, but only the
        # next run benefits).
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes "$EC2_USER@$EC2_HOST" '
            set -e
            cd ~/alt-bitnodes
            git fetch -q origin main
            git reset -q --hard origin/main
            sudo bash deploy/install.sh
          '

      - name: Smoke test dashboard
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes "$EC2_USER@$EC2_HOST" '
            for i in 1 2 3 4 5; do
              code=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:8000/ || true)
              echo "attempt $i: HTTP ${code:-none}"
              [ "$code" = "200" ] && exit 0
              sleep 2
            done
            echo "---- systemctl status alt-bitnodes ----"
            sudo systemctl status alt-bitnodes --no-pager -n 30 || true
            echo "---- journalctl -u alt-bitnodes -n 50 ----"
            sudo journalctl -u alt-bitnodes -n 50 --no-pager || true
            exit 1
          '
