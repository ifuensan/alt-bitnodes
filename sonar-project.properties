sonar.python.version=3.12

# Restrict analysis to first-party code. Everything else (vendored BMAD
# install, generated BMAD outputs, archived openspec changes) inflates
# duplication and issue metrics without being ours to fix.
sonar.sources=app.py,deploy,docs,openspec/specs,README.md,sonar-project.properties,static,templates,requirements.txt,.github

# Belt-and-braces for tools that don't honour sonar.sources alone.
sonar.exclusions=_bmad/**,_bmad-output/**,openspec/changes/archive/**,venv/**,**/__pycache__/**
sonar.cpd.exclusions=_bmad/**,_bmad-output/**,openspec/changes/archive/**
sonar.coverage.exclusions=_bmad/**,_bmad-output/**,openspec/changes/archive/**
