<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bitnodes Dashboard</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header>
  <h1>Bitnodes Dashboard</h1>
  <div class="controls">
    <label>Snapshot:
      <select id="snapshot-select"></select>
    </label>
    <span id="snapshot-meta"></span>
  </div>
</header>

<section class="kpis">
  <div class="kpi"><span class="value" id="kpi-total">—</span><span class="label">Reachable nodes</span></div>
  <div class="kpi"><span class="value" id="kpi-countries">—</span><span class="label">Countries</span></div>
  <div class="kpi"><span class="value" id="kpi-asns">—</span><span class="label">Distinct ASNs</span></div>
  <div class="kpi"><span class="value" id="kpi-height">—</span><span class="label">Median height</span></div>
  <div class="kpi"><span class="value" id="kpi-latency">—</span><span class="label">Median latency (ms)</span></div>
</section>

<section class="grid">
  <div class="panel map-panel">
    <h2>Distribution</h2>
    <div id="globe"></div>
  </div>
  <div class="panel">
    <h2>Top countries</h2>
    <div id="chart-countries" class="plot"></div>
  </div>
  <div class="panel">
    <h2>Top user agents</h2>
    <div id="chart-uas" class="plot"></div>
  </div>
  <div class="panel">
    <h2>Top ASNs</h2>
    <div id="chart-asns" class="plot"></div>
  </div>
</section>

<section class="panel table-panel">
  <h2>Fastest nodes</h2>
  <div class="table-wrap">
    <table id="leaderboard-table">
      <thead>
        <tr>
          <th>Rank</th><th>IP</th><th>Port</th><th>Country</th><th>ASN</th><th>User agent</th><th>Latency (ms)</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</section>

<section class="panel table-panel">
  <h2>Nodes</h2>
  <input id="filter" placeholder="Filter by IP, country, ASN, user agent…">
  <div class="table-wrap">
    <table id="nodes-table">
      <thead>
        <tr>
          <th>IP</th><th>Port</th><th>User agent</th>
          <th>Country</th><th>City</th><th>ASN</th><th>Height</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</section>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"
        integrity="sha384-cCVCZkAjYNxaYKbM8lsArLznDF/SvMFr1jcZrvOpSTCa0W40ZAdLzHCEulnUa5i7"
        crossorigin="anonymous" charset="utf-8"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0"
        integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6.17"
        integrity="sha384-JUpn2GgRr0gxU0xOBd8D8P634jhRCwobtG8G2MMEkX1RnGJ7/FJNnuukpfT+H2w1"
        crossorigin="anonymous"></script>
<script type="module" src="/static/app.js"></script>
</body>
</html>
